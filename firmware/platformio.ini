; EL15 Load Control — standalone firmware for the
; Waveshare ESP32-C6-Touch-AMOLED-1.8.
;
; The ESP32-C6 needs arduino-esp32 3.x (IDF 5.1+), which the mainline
; PlatformIO "espressif32" platform does not yet ship. This uses the
; community pioarduino platform fork, which supports the C6/H2. If you prefer
; the Arduino IDE instead, install "esp32 by Espressif" 3.0.0+ and the same
; three libraries listed below.

[env:esp32-c6-amoled]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board = esp32-c6-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

board_build.flash_mode = qio
board_build.f_flash = 80000000L
; This board has NO PSRAM — Waveshare's spec lists only the C6's on-chip
; 512 KB HP SRAM (~320 KB usable from Arduino) plus 16 MB flash. That is why
; display.cpp uses a 1/8-frame partial LVGL buffer in MALLOC_CAP_INTERNAL
; instead of a full 322 KB framebuffer. Do NOT define BOARD_HAS_PSRAM here:
; it advertises memory that does not exist, so any ps_malloc() would hand back
; null. memory_type stays qio_qspi (it selects the prebuilt lib variant that
; exists for the C6; qio_opi points at a nonexistent variant dir).
board_build.arduino.memory_type = qio_qspi
; The redesigned UI adds large fonts + lv_chart and overflows the default
; ~1.3 MB app slot. The board has 16 MB flash, so use the 3 MB single-app table.
board_build.partitions = huge_app.csv

build_flags =
    -D LV_CONF_INCLUDE_SIMPLE
    -I include
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -std=gnu++17
    -Wall
    -Wextra
    -Wno-unused-parameter
    -Wno-missing-field-initializers
build_unflags =
    -std=gnu++11

lib_deps =
    lvgl/lvgl @ ^8.3.11
    moononournation/GFX Library for Arduino @ ^1.4.9
    h2zero/NimBLE-Arduino @ ^2.1.0
