; EL15 Load Control — standalone firmware for the
; Waveshare ESP32-C6-Touch-AMOLED-1.8.
;
; The ESP32-C6 needs arduino-esp32 3.x (IDF 5.1+), which the mainline
; PlatformIO "espressif32" platform does not yet ship. This uses the
; community pioarduino platform fork, which supports the C6/H2. If you prefer
; the Arduino IDE instead, install "esp32 by Espressif" 3.0.0+ and the same
; three libraries listed below.

[env:esp32-c6-amoled]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board = esp32-c6-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

board_build.flash_mode = qio
board_build.f_flash = 80000000L
; The AMOLED framebuffer + LVGL want PSRAM; the Waveshare board has it.
board_build.arduino.memory_type = qio_opi

build_flags =
    -D LV_CONF_INCLUDE_SIMPLE
    -I include
    -D BOARD_HAS_PSRAM
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -std=gnu++17
build_unflags =
    -std=gnu++11

lib_deps =
    lvgl/lvgl @ ^8.3.11
    moononournation/GFX Library for Arduino @ ^1.4.9
    h2zero/NimBLE-Arduino @ ^2.1.0
