; EL15 Load Control — standalone firmware for the
; Waveshare ESP32-C6-Touch-AMOLED-1.8.
;
; The ESP32-C6 needs arduino-esp32 3.x (IDF 5.1+), which the mainline
; PlatformIO "espressif32" platform does not yet ship. This uses the
; community pioarduino platform fork, which supports the C6/H2. If you prefer
; the Arduino IDE instead, install "esp32 by Espressif" 3.0.0+ and the same
; three libraries listed below.

[env:esp32-c6-amoled]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board = esp32-c6-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

board_build.flash_mode = qio
board_build.f_flash = 80000000L
; This board has NO PSRAM — Waveshare's spec lists only the C6's on-chip
; 512 KB HP SRAM (~320 KB usable from Arduino) plus 16 MB flash. That is why
; display.cpp uses a 1/8-frame partial LVGL buffer in MALLOC_CAP_INTERNAL
; instead of a full 322 KB framebuffer. Do NOT define BOARD_HAS_PSRAM here:
; it advertises memory that does not exist, so any ps_malloc() would hand back
; null. memory_type stays qio_qspi (it selects the prebuilt lib variant that
; exists for the C6; qio_opi points at a nonexistent variant dir).
board_build.arduino.memory_type = qio_qspi
; The redesigned UI adds large fonts + lv_chart and overflows the default
; ~1.3 MB app slot. The board has 16 MB flash, so use the 3 MB single-app table.
board_build.partitions = huge_app.csv

build_flags =
    -D LV_CONF_INCLUDE_SIMPLE
    -I include
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    ; FATFS runs on the caller's stack (CONFIG_FATFS_LFN_STACK: a 255-char long
    ; filename buffer plus the FS work area), and every SD write happens on the
    ; Arduino loop task. 8 KB is the default and too tight for that on top of
    ; LVGL event handlers.
    -D ARDUINO_LOOP_STACK_SIZE=12288
    ; The C6 has ONE general-purpose SPI host and the AMOLED owns it, so the SD
    ; card runs on bit-banged (software) SPI on its own pins — the IDF sdspi
    ; driver cannot share the panel's bus (card init fails at CMD59). We supply
    ; our own SdSpiBaseClass driver (sd_card.cpp) built on plain digitalWrite/Read
    ; for reliable, slow-enough timing; SPI_DRIVER_SELECT=3 selects it. (SdFat's
    ; built-in SoftSpiDriver uses fast register GPIO that was too fast to write
    ; reliably on this card.)
    -D SPI_DRIVER_SELECT=3
    ; Compute a real CRC7 for every command (+ CRC16 on data). Without this,
    ; SdFat sends a fixed 0x87 CRC byte for all commands, which a card with CRC
    ; checking enabled rejects (ACMD41 -> R1 0x08, CRC error). Correct CRCs also
    ; catch the occasional bit error on the bit-banged link instead of trusting it.
    -D USE_SD_CRC=1
    -std=gnu++17
    -Wall
    -Wextra
    -Wno-unused-parameter
    -Wno-missing-field-initializers
build_unflags =
    -std=gnu++11

lib_deps =
    lvgl/lvgl @ ^8.3.11
    moononournation/GFX Library for Arduino @ ^1.4.9
    h2zero/NimBLE-Arduino @ ^2.1.0
    greiman/SdFat @ ^2.2.2
